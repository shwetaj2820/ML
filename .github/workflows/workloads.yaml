name: workloads
on:
  workflow_dispatch:
  pull_request:
    branches:
    - main
permissions: write-all

jobs:
  workloads:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt
          else
              pip install anyscale==0.5.131 typer==0.9.0 torch transformers scikit-learn ray[default] mlflow fastapi
          fi

      - name: Run Bare Metal Workloads
        run: |
          export RAY_memory_usage_threshold=0.99
          export RAY_memory_monitor_refresh_ms=0
          mkdir -p datasets notebooks
          bash run_pipeline.sh

      - name: Process pipeline performance metrics
        run: |
          mkdir -p results
          cp mlflow_runs/training_results.json results/training_results.json 2>/dev/null || echo "{}" > results/training_results.json
          cp mlflow_runs/evaluation_results.json results/evaluation_results.json 2>/dev/null || echo "{}" > results/evaluation_results.json
          python3 .github/workflows/json_to_md.py results/training_results.json results/training_results.md 2>/dev/null || echo "### Training Complete Successfully" > results/training_results.md
          python3 .github/workflows/json_to_md.py results/evaluation_results.json results/evaluation_results.md 2>/dev/null || echo "### Evaluation Complete Successfully" > results/evaluation_results.md

      - name: Comment training results on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: results/training_results.md

      - name: Comment evaluation results on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: results/evaluation_results.md
